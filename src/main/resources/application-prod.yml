spring:
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java
  #文件上传大小限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://localhost:3306/testdb?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&useSSL=true
    username: testdb
    password: jj25Xkf5En2W2fFp
    driver-class-name: com.mysql.cj.jdbc.Driver
  mvc:
    static-path-pattern: /static/**
  web:
    resources:
      static-locations:
        classpath:/static/,classpath:/public,classpath:/resources,classpath:/META-INF/resources,file:SystemData

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.lunabaka.entity
  configuration:
    map-underscore-to-camel-case: true
#mybatis-plus配置日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置 (至少64字符以满足HS512的512位要求)
config:
  jwt:
    secret: ThisIsAVeryLongAndSecureSecretKeyForJWTTokenSigningThatMustBeAtLeastSixtyFourCharactersLongToMeetHS512Requirements12345678901234567890
    expire: 86400

# Session
server:
  servlet:
    session:
      timeout: 168h
